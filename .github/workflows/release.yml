# Publish a single @weavo/* package to npm when its release tag is pushed.
#
# Tag format: weavo-<package>@<semver>
#   weavo-core@1.2.3
#   weavo-sync@1.1.2
#   weavo-transport@1.1.2
#   weavo-client@1.2.3
#
# Push tags: bun run tag-release core 1.2.3 client 1.2.3

name: Release package

on:
  push:
    tags:
      - "weavo-core@*"
      - "weavo-sync@*"
      - "weavo-transport@*"
      - "weavo-client@*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package short name (core, sync, transport, client)"
        required: true
        type: choice
        options:
          - core
          - sync
          - transport
          - client

permissions:
  contents: read
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package from tag
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pkg_short="$INPUT_PACKAGE"
            dir="packages/${pkg_short}"
            if [ ! -f "$dir/package.json" ]; then
              echo "Unknown package: $pkg_short" >&2
              exit 1
            fi
            version=$(node -p "require('./$dir/package.json').version")
          else
            if [[ ! "$REF_NAME" =~ ^weavo-(core|sync|transport|client)@(.+)$ ]]; then
              echo "Invalid release tag: $REF_NAME" >&2
              echo "Expected: weavo-<package>@<semver> (e.g. weavo-core@1.2.3)" >&2
              exit 1
            fi
            pkg_short="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
            dir="packages/${pkg_short}"
          fi

          pkg_name=$(node -p "require('./$dir/package.json').name")
          pkg_version=$(node -p "require('./$dir/package.json').version")

          if [ "$pkg_version" != "$version" ]; then
            echo "Tag version $version does not match $pkg_name@$pkg_version in package.json" >&2
            exit 1
          fi

          echo "pkg_short=$pkg_short" >> "$GITHUB_OUTPUT"
          echo "pkg_name=$pkg_name" >> "$GITHUB_OUTPUT"
          echo "pkg_dir=$dir" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package and dependencies
        run: bunx turbo run build --filter=${{ steps.meta.outputs.pkg_name }}...

      - name: Publish to npm
        working-directory: ${{ steps.meta.outputs.pkg_dir }}
        run: |
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN
          npm publish --provenance --access public
